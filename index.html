* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #080c0f;
  --surface: #0e1318;
  --card:    #131a20;
  --card2:   #19222a;
  --border:  #1e2930;
  --border2: #253040;
  --text:    #d4dce6;
  --muted:   #4a5a6a;
  --dim:     #2a3a4a;
  --accent:  #e8b84b;
  --green:   #3dd68c;
  --red:     #f05a5a;
  --sharp:   #b76ef0;
  --live:    #3dd68c;
}

html, body { height: 100%; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'IBM Plex Mono', 'SF Mono', 'Fira Code', monospace;
  min-height: 100vh;
}

/* ── HEADER ─────────────────────────────────────── */
.header {
  position: sticky;
  top: 0;
  z-index: 20;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 52px;
}
.logo {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 3px;
  color: var(--accent);
}
.logo em { color: var(--muted); font-style: normal; }
.sync-btn {
  background: none;
  border: 1px solid var(--border2);
  color: var(--muted);
  padding: 6px 12px;
  border-radius: 3px;
  cursor: pointer;
  font-family: inherit;
  font-size: 11px;
  letter-spacing: 1px;
  transition: all 0.15s;
}
.sync-btn:hover { border-color: var(--accent); color: var(--accent); }
.sync-btn.spinning { animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── TABS ───────────────────────────────────────── */
.tabs-row {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
  display: flex;
  gap: 0;
}
.sport-tab {
  flex: 1;
  padding: 11px 0;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--muted);
  font-family: inherit;
  font-size: 12px;
  letter-spacing: 1px;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
}
.sport-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.mkt-row {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 8px 16px;
  display: flex;
  gap: 6px;
}
.mkt-tab {
  padding: 4px 14px;
  background: none;
  border: 1px solid var(--dim);
  border-radius: 30px;
  color: var(--muted);
  font-family: inherit;
  font-size: 11px;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all 0.15s;
}
.mkt-tab.active {
  border-color: var(--text);
  color: var(--text);
  background: var(--card2);
}

/* ── SEARCH ─────────────────────────────────────── */
.search-row {
  padding: 10px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.search-input {
  width: 100%;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 7px 12px;
  border-radius: 3px;
  font-family: inherit;
  font-size: 12px;
}
.search-input::placeholder { color: var(--dim); }
.search-input:focus { outline: none; border-color: var(--border2); }

/* ── GAMES ──────────────────────────────────────── */
.games {
  padding: 12px 16px 80px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.game-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
  cursor: pointer;
  transition: border-color 0.15s;
}
.game-card:hover, .game-card.open { border-color: var(--border2); }

.game-main {
  padding: 11px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.game-time {
  font-size: 10px;
  color: var(--muted);
  min-width: 44px;
  line-height: 1.5;
}

.game-teams { flex: 1; min-width: 0; }
.t-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 2px 0;
}
.t-name {
  font-size: 12px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 160px;
}
.t-name.away { color: var(--muted); font-weight: 400; }
.t-name.total-label { color: var(--text); font-weight: 500; font-size: 11px; letter-spacing: 1px; }

.t-odds {
  font-size: 13px;
  font-weight: 600;
  min-width: 52px;
  text-align: right;
  display: flex;
  align-items: center;
  gap: 4px;
  justify-content: flex-end;
}
.t-odds .pt { font-size: 11px; color: var(--muted); font-weight: 400; }
.t-odds.pos .val { color: var(--green); }
.t-odds.neg .val { color: var(--red); }
.t-odds.na .val { color: var(--dim); font-size: 10px; font-weight: 400; }

.game-meta {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
  min-width: 28px;
}

.badge {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.5px;
  padding: 2px 5px;
  border-radius: 2px;
}
.badge.sharp {
  background: rgba(183,110,240,0.12);
  color: var(--sharp);
  border: 1px solid rgba(183,110,240,0.25);
}

.chevron {
  color: var(--dim);
  font-size: 10px;
  transition: transform 0.2s;
}
.game-card.open .chevron { transform: rotate(180deg); }

/* ── BOOK BREAKDOWN ─────────────────────────────── */
.breakdown {
  display: none;
  border-top: 1px solid var(--border);
  background: var(--surface);
  padding: 10px 14px 12px;
}
.game-card.open .breakdown { display: block; }

.bk-header {
  display: flex;
  gap: 4px;
  margin-bottom: 6px;
}
.bk-team-col { flex: 1; min-width: 0; }
.bk-col {
  width: 42px;
  text-align: center;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.5px;
}

.bk-row {
  display: flex;
  gap: 4px;
  margin-bottom: 3px;
  align-items: center;
}
.bk-team {
  flex: 1;
  font-size: 10px;
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.bk-val {
  width: 42px;
  text-align: center;
  font-size: 11px;
  padding: 3px 2px;
  border-radius: 2px;
}
.bk-val.pos { color: var(--green); }
.bk-val.neg { color: var(--red); }
.bk-val.na { color: var(--dim); }
.bk-val.best { background: rgba(232,184,75,0.1); color: var(--accent); }
.bk-val.sharp-book { text-decoration: underline; text-underline-offset: 2px; text-decoration-color: var(--sharp); }

/* ── STATES ─────────────────────────────────────── */
.state { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 12px; letter-spacing: 1px; }
.state.error { color: var(--red); }
.state .blink { animation: blink 1s steps(1) infinite; }
@keyframes blink { 50% { opacity: 0; } }

/* ── STATUS BAR ─────────────────────────────────── */
.status-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 8px 16px;
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.5px;
}

<body>

<div class="header">
  <div class="logo">SHARP<em>LINE</em></div>
  <button class="sync-btn" id="sync-btn" onclick="fetchOdds()">↻ SYNC</button>
</div>

<div class="tabs-row">
  <button class="sport-tab active" id="tab-nba" onclick="setSport('basketball_nba')">🏀 NBA</button>
  <button class="sport-tab" id="tab-mlb" onclick="setSport('baseball_mlb')">⚾ MLB</button>
</div>

<div class="mkt-row">
  <button class="mkt-tab active" id="mkt-h2h"     onclick="setMarket('h2h')">ML</button>
  <button class="mkt-tab"        id="mkt-spreads"  onclick="setMarket('spreads')">SPD</button>
  <button class="mkt-tab"        id="mkt-totals"   onclick="setMarket('totals')">TOT</button>
</div>

<div class="search-row">
  <input class="search-input" id="search" type="text" placeholder="search teams..." oninput="render()" />
</div>

<div class="games" id="games"></div>

<div class="status-bar">
  <span id="s-time">—</span>
  <span id="s-count">—</span>
</div>

<script>
/* ──────────────────────────────────────────────────────
   CONFIG
────────────────────────────────────────────────────── */
const PROXY = "https://sharpline-proxy.vercel.app/api/Odds";

// Books known to take sharp/professional action
// These are the ones that move their lines based on sharp bettors
const SHARP_BOOKS  = new Set(["lowvig", "betonlineag", "pinnacle", "bookmaker", "williamhill_us"]);

// Standard US-facing square sportsbooks
const SQUARE_BOOKS = ["draftkings", "fanduel", "betmgm", "caesars", "pointsbet", "barstool", "mybookieag"];

const BOOK_LABEL = {
  draftkings: "DK",   fanduel: "FD",    betmgm: "MGM",
  caesars: "CZR",     pointsbet: "PB",   barstool: "BST",
  mybookieag: "MYB",  lowvig: "LVG",     betonlineag: "BOL",
  pinnacle: "PIN",    bookmaker: "BKR",  williamhill_us: "WH",
  bovada: "BOV",
};

// ── Extreme line thresholds (lines beyond these are not useful to show)
// These happen when a side is a massive underdog — the line is real but
// practically useless for betting. We hide it rather than clutter the UI.
// Hide lines beyond these — real but unplayable junk
const EXTREME = { h2h: 300, spreads: 175, totals: 175 };
// Also hide if point spread/total is absurd
const EXTREME_PT = { spreads: 20, totals: 30 };

/* ──────────────────────────────────────────────────────
   STATE
────────────────────────────────────────────────────── */
let sport    = "basketball_nba";
let market   = "h2h";
let games    = [];
let openIds  = new Set();
let fetching = false;

/* ──────────────────────────────────────────────────────
   HELPERS
────────────────────────────────────────────────────── */
function isExtreme(price, point) {
  if (price == null || !isFinite(price)) return true;
  if (Math.abs(price) > EXTREME[market]) return true;
  if (point != null && EXTREME_PT[market] != null && Math.abs(point) > EXTREME_PT[market]) return true;
  return false;
}

// Get a team's outcome from a bookmaker for current market.
// Returns { price, point } or null if missing/extreme.
function getOutcome(bookmaker, teamName) {
  const mkt = (bookmaker.markets || []).find(m => m.key === market);
  if (!mkt) return null;
  const o = (mkt.outcomes || []).find(o => o.name === teamName);
  if (!o || isExtreme(o.price, o.point ?? null)) return null;
  return { price: o.price, point: o.point ?? null };
}

// Convert American odds → implied probability (no vig removed)
function toProb(american) {
  if (american < 0) return Math.abs(american) / (Math.abs(american) + 100);
  return 100 / (american + 100);
}

// Convert implied probability → American odds
function toAmerican(prob) {
  if (prob >= 0.5) return Math.round(-(prob / (1 - prob)) * 100);
  return Math.round(((1 - prob) / prob) * 100);
}

// Consensus: average implied probabilities across valid odds, convert back
function consensus(oddsArr) {
  if (!oddsArr.length) return null;
  const avg = oddsArr.reduce((s, v) => s + toProb(v), 0) / oddsArr.length;
  return toAmerican(avg);
}

// Consensus point value (spread / total line)
function consensusPt(pts) {
  if (!pts.length) return null;
  const avg = pts.reduce((a, b) => a + b, 0) / pts.length;
  return Math.round(avg * 2) / 2; // round to nearest 0.5
}

function fmt(price) {
  if (price == null) return null;
  return price > 0 ? `+${price}` : `${price}`;
}
function fmtPt(pt) {
  if (pt == null) return "";
  return pt > 0 ? `+${pt}` : `${pt}`;
}
function fmtTime(iso) {
  return new Date(iso).toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit", hour12: true });
}

/* ──────────────────────────────────────────────────────
   SHARP DETECTION
   
   Logic: Compare what sharp books say vs what square books say.
   SHARP fires only when:
     1. At least 1 sharp book (lowvig, betonlineag, pinnacle, etc.) is present
        AND at least 2 square books are present
     2. Then one of these conditions:
        A. Sharp books and square books disagree on WHO the favorite is
           (sharps have the other side priced as favorite)
        B. Same side is favorite in both, but sharps have a price that's
           meaningfully different (>12 pts ML, >10 pts spread)
           AND that difference is in the direction of the underdog
           (sharps are giving better odds on the dog = sharp dog action)
   
   This prevents false positives from normal vig/line variation.
────────────────────────────────────────────────────── */
function detectSharp(game, t1, t2) {
  if (market === "totals") return false; // Sharp detection not meaningful for totals without historical data

  const sharpT1 = [], sharpT2 = [], squareT1 = [], squareT2 = [];

  for (const bk of game.bookmakers) {
    const o1 = getOutcome(bk, t1);
    const o2 = getOutcome(bk, t2);
    if (!o1 || !o2) continue; // need both sides from same book

    if (SHARP_BOOKS.has(bk.key)) {
      sharpT1.push(o1.price);
      sharpT2.push(o2.price);
    } else if (SQUARE_BOOKS.includes(bk.key)) {
      squareT1.push(o1.price);
      squareT2.push(o2.price);
    }
  }

  // Need at least 1 sharp book AND 2 square books for a meaningful comparison
  if (!sharpT1.length || squareT1.length < 2) return false;

  const shpC1 = consensus(sharpT1);
  const shpC2 = consensus(sharpT2);
  const sqC1  = consensus(squareT1);
  const sqC2  = consensus(squareT2);

  if (!shpC1 || !shpC2 || !sqC1 || !sqC2) return false;

  // Who is the favorite according to each group?
  // More negative = bigger favorite
  const sqFavsT1  = sqC1  < sqC2;   // squares think T1 is fav
  const shpFavsT1 = shpC1 < shpC2;  // sharps think T1 is fav

  // CONDITION A: They disagree on who the favorite is → clear sharp signal
  if (sqFavsT1 !== shpFavsT1) return true;

  // CONDITION B: Same side is favorite, but sharps are noticeably more
  // favorable on the underdog (or less favorable on the fav).
  // This indicates sharp money is on the dog.
  const threshold = market === "spreads" ? 10 : 14;
  const diff1 = Math.abs(shpC1 - sqC1);
  const diff2 = Math.abs(shpC2 - sqC2);

  // Which team is the underdog (more positive odds)?
  const dogIsT1 = sqC1 > sqC2;
  const dogDiff = dogIsT1 ? diff1 : diff2;
  const favDiff = dogIsT1 ? diff2 : diff1;

  // Sharp signal: sharps have significantly better odds on the dog
  // but NOT just universal line movement (both sides moved same direction)
  if (dogDiff > threshold && dogDiff > favDiff) return true;

  return false;
}

/* ──────────────────────────────────────────────────────
   RENDER
────────────────────────────────────────────────────── */
function render() {
  const container = document.getElementById("games");
  const query = document.getElementById("search").value.toLowerCase().trim();

  let list = games;
  if (query) {
    list = games.filter(g =>
      g.home_team.toLowerCase().includes(query) ||
      g.away_team.toLowerCase().includes(query)
    );
  }

  if (!list.length) {
    container.innerHTML = `<div class="state">${query ? "no results" : "no games"}</div>`;
    document.getElementById("s-count").textContent = "—";
    return;
  }

  document.getElementById("s-count").textContent = `${list.length} game${list.length !== 1 ? "s" : ""}`;

  // Which display books actually appear in the current data?
  const allBookKeys = new Set();
  for (const g of games) for (const bk of g.bookmakers) allBookKeys.add(bk.key);

  // Preferred display order: squares first, then any sharp books present
  const displayBooks = [
    ...SQUARE_BOOKS.filter(k => allBookKeys.has(k)),
    ...[...SHARP_BOOKS].filter(k => allBookKeys.has(k))
  ].slice(0, 8); // cap at 8 books for display

  const isTotal = market === "totals";

  container.innerHTML = list.map(game => {
    const { id, home_team, away_team, commence_time, bookmakers } = game;
    const isOpen = openIds.has(id);

    // For totals, teams are "Over" / "Under"
    const t1 = isTotal ? "Over"  : home_team;
    const t2 = isTotal ? "Under" : away_team;

    // Collect valid odds across all books
    const allP1 = [], allP2 = [], allPt1 = [], allPt2 = [];
    const bookMap = {}; // key → { p1, p2, pt1, pt2 }

    for (const bk of bookmakers) {
      const o1 = getOutcome(bk, t1);
      const o2 = getOutcome(bk, t2);
      bookMap[bk.key] = { o1, o2 };
      if (o1) { allP1.push(o1.price); if (o1.point != null) allPt1.push(o1.point); }
      if (o2) { allP2.push(o2.price); if (o2.point != null) allPt2.push(o2.point); }
    }

    const consP1  = consensus(allP1);
    const consP2  = consensus(allP2);
    const consPt1 = consensusPt(allPt1);
    const consPt2 = consensusPt(allPt2);

    const isSharp = detectSharp(game, t1, t2);

    // Best price per side (highest number = most favorable to bettor)
    const bestP1 = allP1.length ? Math.max(...allP1) : null;
    const bestP2 = allP2.length ? Math.max(...allP2) : null;

    // Render consensus odds cell
    function oddsCell(p, pt) {
      if (p == null) return `<div class="t-odds na"><span class="val">N/A</span></div>`;
      const cls = p > 0 ? "pos" : "neg";
      const ptStr = (pt != null && market !== "h2h") ? `<span class="pt">${fmtPt(pt)}</span>` : "";
      return `<div class="t-odds ${cls}">${ptStr}<span class="val">${fmt(p)}</span></div>`;
    }

    const sharpBadge = isSharp ? `<span class="badge sharp">⚡ SHARP</span>` : "";

    // Book breakdown header
    const bkHeader = displayBooks.map(k =>
      `<div class="bk-col">${BOOK_LABEL[k] || k}</div>`
    ).join("");

    // Book row for one team
    function bkRow(label, side, bestP) {
      const cells = displayBooks.map(k => {
        const o = bookMap[k]?.[side];
        if (!o) return `<div class="bk-val na">—</div>`;
        const isBest  = o.price === bestP;
        const isSharpBk = SHARP_BOOKS.has(k);
        const cls = [
          o.price > 0 ? "pos" : "neg",
          isBest    ? "best"       : "",
          isSharpBk ? "sharp-book" : ""
        ].filter(Boolean).join(" ");
        const ptStr = (o.point != null && market !== "h2h") ? `${fmtPt(o.point)} ` : "";
        return `<div class="bk-val ${cls}">${ptStr}${fmt(o.price)}</div>`;
      }).join("");
      return `<div class="bk-row"><div class="bk-team">${label}</div>${cells}</div>`;
    }

    const label1 = isTotal ? "OVER"  : home_team.split(" ").pop();
    const label2 = isTotal ? "UNDER" : away_team.split(" ").pop();

    const timeStr = fmtTime(commence_time);
    const sport_label = game.sport_key === "basketball_nba" ? "NBA" : "MLB";

    return `
<div class="game-card ${isOpen ? "open" : ""}" id="gc-${id}" onclick="toggleGame('${id}')">
  <div class="game-main">
    <div class="game-time">${timeStr}<br><span style="font-size:9px;color:var(--dim)">${sport_label}</span></div>
    <div class="game-teams">
      <div class="t-row">
        <span class="t-name ${isTotal ? 'total-label' : 'away'}">${isTotal ? "OVER" : away_team}</span>
        ${oddsCell(consP2, consPt2)}
      </div>
      <div class="t-row">
        <span class="t-name ${isTotal ? 'total-label' : ''}">${isTotal ? "UNDER" : home_team}</span>
        ${oddsCell(consP1, consPt1)}
      </div>
    </div>
    <div class="game-meta">
      ${sharpBadge}
      <span class="chevron">▾</span>
    </div>
  </div>
  <div class="breakdown">
    <div class="bk-header">
      <div class="bk-team-col"></div>
      ${bkHeader}
    </div>
    ${bkRow(label2, "o2", bestP2)}
    ${bkRow(label1, "o1", bestP1)}
    ${isSharp ? `<div style="margin-top:8px;font-size:10px;color:var(--sharp);opacity:0.8;">⚡ sharp books underlined — disagree with public line</div>` : ""}
  </div>
</div>`;
  }).join("");
}

function toggleGame(id) {
  if (openIds.has(id)) openIds.delete(id);
  else openIds.add(id);
  document.getElementById(`gc-${id}`).classList.toggle("open");
  // Re-render the single card in place — avoids full re-render flicker
  render();
}

/* ──────────────────────────────────────────────────────
   FETCH
────────────────────────────────────────────────────── */
async function fetchOdds() {
  if (fetching) return;
  fetching = true;

  const btn = document.getElementById("sync-btn");
  btn.classList.add("spinning");

  document.getElementById("games").innerHTML = `<div class="state">fetching lines<span class="blink">_</span></div>`;
  document.getElementById("s-time").textContent  = "syncing...";
  document.getElementById("s-count").textContent = "—";

  try {
    const url = `${PROXY}?sport=${sport}`;
    const res = await fetch(url);

    if (!res.ok) {
      let msg = `HTTP ${res.status}`;
      try { const j = await res.json(); msg = j.error || msg; } catch {}
      throw new Error(msg);
    }

    const data = await res.json();

    if (!Array.isArray(data)) {
      // Could be an error object from the Odds API itself
      const msg = data?.message || data?.error || "Unexpected response";
      throw new Error(msg);
    }

    // Only upcoming games — drop anything that's already started
    const now = Date.now();
    games = data
      .filter(g => new Date(g.commence_time).getTime() > now)
      .sort((a, b) => new Date(a.commence_time) - new Date(b.commence_time));

    const now = new Date().toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit", hour12: true });
    document.getElementById("s-time").textContent = `synced ${now}`;

    render();
  } catch (e) {
    document.getElementById("games").innerHTML = `<div class="state error">⚠ ${e.message}</div>`;
    document.getElementById("s-time").textContent  = "error";
    document.getElementById("s-count").textContent = "—";
  } finally {
    fetching = false;
    btn.classList.remove("spinning");
  }
}

/* ──────────────────────────────────────────────────────
   SPORT / MARKET TOGGLE
────────────────────────────────────────────────────── */
function setSport(s) {
  sport = s;
  games = [];
  openIds.clear();
  document.getElementById("tab-nba").classList.toggle("active", s === "basketball_nba");
  document.getElementById("tab-mlb").classList.toggle("active", s === "baseball_mlb");
  fetchOdds();
}

function setMarket(m) {
  market = m;
  document.getElementById("mkt-h2h").classList.toggle("active",    m === "h2h");
  document.getElementById("mkt-spreads").classList.toggle("active", m === "spreads");
  document.getElementById("mkt-totals").classList.toggle("active",  m === "totals");
  render();
}

/* ──────────────────────────────────────────────────────
   INIT
────────────────────────────────────────────────────── */
fetchOdds();
</script>
