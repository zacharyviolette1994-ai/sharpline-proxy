<body>

<div id="header">
  <div class="logo-row">
    <div class="logo">Sharp<span>Line</span></div>
    <button id="sync-btn" onclick="fetchOdds()">↻ sync</button>
  </div>
  <div class="tab-row">
    <button class="sport-tab active" data-sport="basketball_nba" onclick="setSport(this)">🏀 NBA</button>
    <button class="sport-tab" data-sport="baseball_mlb" onclick="setSport(this)">⚾ MLB</button>
  </div>
  <div class="market-row">
    <button class="market-tab active" data-market="h2h" onclick="setMarket(this)">ML</button>
    <button class="market-tab" data-market="spreads" onclick="setMarket(this)">SPD</button>
    <button class="market-tab" data-market="totals" onclick="setMarket(this)">TOT</button>
  </div>
</div>

<div id="search-wrap">
  <input id="search" placeholder="Search team..." oninput="renderGames()" />
  <div id="meta"></div>
</div>

<div id="games"></div>

<script>
const BOOK_LABELS = {
  draftkings:"DK", fanduel:"FD", betmgm:"MGM", caesars:"CZR",
  pointsbet:"PB", bovada:"BOV", betonlineag:"BOL", mybookieag:"MYB",
  lowvig:"LVG", barstool:"BST", williamhill_us:"WH", unibet_us:"UNI",
  betrivers:"BR", superbook:"SUP", betus:"BET",
};

let currentSport = "basketball_nba";
let currentMarket = "h2h";
let allGames = [];
let lastUpdated = null;

function setSport(el) {
  document.querySelectorAll('.sport-tab').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  currentSport = el.dataset.sport;
  fetchOdds();
}

function setMarket(el) {
  document.querySelectorAll('.market-tab').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  currentMarket = el.dataset.market;
  renderGames();
}

function formatOdds(n) {
  if (n == null) return "—";
  return n > 0 ? `+${n}` : `${n}`;
}

function formatTime(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString("en-US", { weekday:"short", month:"short", day:"numeric" }) +
    "  " + d.toLocaleTimeString("en-US", { hour:"numeric", minute:"2-digit" });
}

function consensusLine(bookmakers, market, team) {
  const lines = [];
  for (const bk of bookmakers) {
    const m = bk.markets?.find(x => x.key === market);
    const o = m?.outcomes?.find(x => x.name === team);
    if (o?.price != null) lines.push(o.price);
  }
  if (!lines.length) return null;
  return Math.round(lines.reduce((a,b) => a+b, 0) / lines.length);
}

function consensusPoint(bookmakers, market, team) {
  for (const bk of bookmakers) {
    const m = bk.markets?.find(x => x.key === market);
    const o = m?.outcomes?.find(x => x.name === team);
    if (o?.point != null) return o.point;
  }
  return null;
}

function lineSpread(bookmakers, market, team) {
  const lines = [];
  for (const bk of bookmakers) {
    const m = bk.markets?.find(x => x.key === market);
    const o = m?.outcomes?.find(x => x.name === team);
    if (o?.price != null) lines.push(o.price);
  }
  if (lines.length < 2) return 0;
  return Math.max(...lines) - Math.min(...lines);
}

function oddsCell(value, point, sharp) {
  const cls = sharp ? "odds-sharp" : value > 0 ? "odds-pos" : value < 0 ? "odds-neg" : "odds-none";
  const pt = (point != null && currentMarket !== "h2h") ? `${point > 0 ? "+" : ""}${point} ` : "";
  return `<span class="odds-val ${cls}">${pt}${formatOdds(value)}</span>`;
}

function renderGames() {
  const search = document.getElementById("search").value.toLowerCase();
  const container = document.getElementById("games");
  const meta = document.getElementById("meta");

  const filtered = allGames.filter(g =>
    g.home_team.toLowerCase().includes(search) ||
    g.away_team.toLowerCase().includes(search)
  );

  if (lastUpdated) {
    meta.textContent = `${filtered.length} games · ${lastUpdated.toLocaleTimeString()}`;
  }

  if (!filtered.length) {
    container.innerHTML = `<div class="empty-msg">no games found</div>`;
    return;
  }

  container.innerHTML = filtered.map((game, i) => {
    const { home_team, away_team, bookmakers, commence_time } = game;
    const isLive = new Date(commence_time) < new Date();

    const teams = currentMarket === "totals"
      ? [{ team: "Over" }, { team: "Under" }]
      : [{ team: away_team }, { team: home_team }];

    const sharpTeam = teams.reduce((best, t) => {
      const s = lineSpread(bookmakers, currentMarket, t.team);
      return s > (best?.score ?? 0) ? { team: t.team, score: s } : best;
    }, null);

    const teamRows = teams.map(({ team }) => {
      const odds = consensusLine(bookmakers, currentMarket, team);
      const point = consensusPoint(bookmakers, currentMarket, team);
      const isSharp = sharpTeam?.team === team && sharpTeam?.score >= 15;
      return `
        <div class="team-row">
          <div class="team-info">
            ${isSharp ? `<span class="sharp-badge">sharp</span>` : ""}
            <span class="team-name">${team}</span>
          </div>
          ${oddsCell(odds, point, isSharp)}
        </div>`;
    }).join("");

    const bookRows = bookmakers.slice(0, 8).map(bk => {
      const label = BOOK_LABELS[bk.key] || bk.key.slice(0,4).toUpperCase();
      const cells = teams.map(({ team }) => {
        const m = bk.markets?.find(x => x.key === currentMarket);
        const o = m?.outcomes?.find(x => x.name === team);
        return oddsCell(o?.price ?? null, o?.point ?? null, false);
      }).join("");
      return `<div class="book-row"><span class="book-label">${label}</span><div class="book-odds">${cells}</div></div>`;
    }).join("");

    return `
      <div class="game-card">
        <div class="game-header" onclick="toggleCard(${i})">
          <div class="game-time ${isLive ? "live" : ""}">
            <span>${isLive ? "● live" : formatTime(commence_time)}</span>
            <span class="chevron" id="chevron-${i}">▼</span>
          </div>
          ${teamRows}
        </div>
        <div class="book-breakdown" id="breakdown-${i}">
          <div class="breakdown-title">Book Breakdown</div>
          ${bookRows}
        </div>
      </div>`;
  }).join("");
}

function toggleCard(i) {
  const bd = document.getElementById(`breakdown-${i}`);
  const ch = document.getElementById(`chevron-${i}`);
  bd.classList.toggle("open");
  ch.textContent = bd.classList.contains("open") ? "▲" : "▼";
}

async function fetchOdds() {
  const btn = document.getElementById("sync-btn");
  const container = document.getElementById("games");
  btn.disabled = true;
  btn.textContent = "syncing...";
  container.innerHTML = `<div class="empty-msg">fetching lines...</div>`;

  try {
    const res = await fetch(`/api/Odds?sport=${currentSport}&markets=h2h,spreads,totals`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (!Array.isArray(data)) throw new Error(data?.message || "Unexpected response");
    allGames = data.sort((a,b) => new Date(a.commence_time) - new Date(b.commence_time));
    lastUpdated = new Date();
    renderGames();
  } catch(e) {
    container.innerHTML = `<div class="error-box">⚠ ${e.message}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = "↻ sync";
  }
}

fetchOdds();
</script>

</body>
